<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retry Logic Gateway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px;
    }

    h1 { font-size: 1.25rem; color: #94a3b8; letter-spacing: .05em; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 10px;
      padding: 24px;
      width: 100%;
      max-width: 440px;
    }

    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      background: transparent; color: #64748b; cursor: pointer; font-size: .875rem;
      transition: background .15s, color .15s;
    }
    .tab.active { background: #3b4cca; color: #fff; }

    .field { margin-bottom: 12px; }
    label { display: block; font-size: .75rem; color: #94a3b8; margin-bottom: 4px; }
    input {
      width: 100%; padding: 9px 12px; border-radius: 6px;
      border: 1px solid #2d3348; background: #141624; color: #e2e8f0;
      font-size: .875rem; outline: none;
    }
    input:focus { border-color: #3b4cca; }

    button.primary {
      width: 100%; padding: 10px; border: none; border-radius: 6px;
      background: #3b4cca; color: #fff; font-size: .875rem;
      cursor: pointer; transition: background .15s;
    }
    button.primary:hover { background: #4c5edb; }
    button.primary:disabled { background: #2d3348; color: #64748b; cursor: default; }

    .status {
      font-size: .75rem; padding: 6px 10px; border-radius: 6px;
      margin-top: 10px; display: none;
    }
    .status.ok  { background: #14532d; color: #86efac; display: block; }
    .status.err { background: #450a0a; color: #fca5a5; display: block; }

    #user-bar {
      display: none; width: 100%; max-width: 440px;
      background: #1e2130; border: 1px solid #2d3348; border-radius: 10px;
      padding: 10px 16px; font-size: .75rem; color: #94a3b8;
      display: flex; align-items: center; justify-content: space-between;
    }
    #user-bar span { color: #a5b4fc; font-weight: 600; }
    #user-bar button {
      background: none; border: 1px solid #2d3348; color: #64748b;
      border-radius: 5px; padding: 4px 10px; cursor: pointer; font-size: .75rem;
    }
    #user-bar button:hover { color: #e2e8f0; }

    #chat-panel { width: 100%; max-width: 440px; display: none; flex-direction: column; gap: 8px; }

    #session-row { display: flex; gap: 8px; align-items: center; }
    #session-row input { flex: 1; }
    #session-row button {
      padding: 9px 12px; border: 1px solid #2d3348; border-radius: 6px;
      background: #141624; color: #94a3b8; cursor: pointer; font-size: .75rem; white-space: nowrap;
    }

    #messages {
      background: #141624; border: 1px solid #2d3348; border-radius: 8px;
      height: 280px; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #messages .empty { color: #475569; font-size: .8rem; text-align: center; margin: auto; }

    .msg { display: flex; flex-direction: column; gap: 2px; max-width: 85%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; }
    .msg .bubble {
      padding: 8px 12px; border-radius: 10px; font-size: .825rem; line-height: 1.45;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: #3b4cca; color: #fff; border-bottom-right-radius: 2px; }
    .msg.bot  .bubble { background: #1e2130; border: 1px solid #2d3348; border-bottom-left-radius: 2px; }
    .msg .meta { font-size: .65rem; color: #475569; padding: 0 4px; }

    #input-row { display: flex; gap: 8px; }
    #input-row input { flex: 1; }
    #send-btn {
      padding: 9px 16px; border: none; border-radius: 6px;
      background: #3b4cca; color: #fff; cursor: pointer; font-size: .875rem;
    }
    #send-btn:hover { background: #4c5edb; }
    #send-btn:disabled { background: #2d3348; color: #64748b; cursor: default; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<h1>Retry Logic Gateway</h1>

<div id="user-bar" class="hidden">
  Logged in as <span id="user-email"></span>
  <button onclick="logout()">Log out</button>
</div>

<div class="card" id="auth-card">
  <div class="tabs">
    <button class="tab active" id="tab-login"    onclick="switchTab('login')">Login</button>
    <button class="tab"        id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="you@example.com" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="primary" onclick="doLogin()">Login</button>
    <div class="status" id="login-status"></div>
  </div>

  <div id="form-register" class="hidden">
    <div class="field">
      <label>Email</label>
      <input id="reg-email" type="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="reg-pass" type="password" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') doRegister()">
    </div>
    <button class="primary" onclick="doRegister()">Create account</button>
    <div class="status" id="reg-status"></div>
  </div>
</div>

<div id="chat-panel" class="hidden">
  <div id="session-row">
    <input id="session-id" placeholder="Session ID" value="session-1">
    <button onclick="clearChat()">Clear</button>
  </div>
  <div id="messages">
    <div class="empty" id="empty-hint">Send a message to start chatting.</div>
  </div>
  <div id="input-row">
    <input id="msg-input" placeholder="Type a message…"
           onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }">
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const API = '';
  let token = null;
  let userEmail = null;

  function switchTab(tab) {
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function setStatus(id, msg, isErr) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'status ' + (isErr ? 'err' : 'ok');
  }

  async function doRegister() {
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    if (!email || !pass) return setStatus('reg-status', 'Email and password required.', true);
    try {
      const r = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
      setStatus('reg-status', 'Account created! Now log in.', false);
      setTimeout(() => switchTab('login'), 1200);
      document.getElementById('login-email').value = email;
    } catch (e) {
      setStatus('reg-status', e.message, true);
    }
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) return setStatus('login-status', 'Email and password required.', true);
    try {
      const body = new URLSearchParams({ username: email, password: pass });
      const r = await fetch(`${API}/auth/login`, { method: 'POST', body });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || JSON.stringify(data));
      token = data.access_token;
      userEmail = email;
      onLoggedIn();
    } catch (e) {
      setStatus('login-status', e.message, true);
    }
  }

  function onLoggedIn() {
    document.getElementById('auth-card').classList.add('hidden');
    document.getElementById('user-bar').classList.remove('hidden');
    document.getElementById('user-email').textContent = userEmail;
    document.getElementById('chat-panel').classList.remove('hidden');
    document.getElementById('chat-panel').style.display = 'flex';
    document.getElementById('msg-input').focus();
  }

  function logout() {
    token = null; userEmail = null;
    document.getElementById('auth-card').classList.remove('hidden');
    document.getElementById('user-bar').classList.add('hidden');
    document.getElementById('chat-panel').classList.add('hidden');
    document.getElementById('messages').innerHTML =
      '<div class="empty" id="empty-hint">Send a message to start chatting.</div>';
    document.getElementById('login-pass').value = '';
    setStatus('login-status', 'Logged out.', false);
  }

  function appendMsg(role, text) {
    const box = document.getElementById('messages');
    const hint = document.getElementById('empty-hint');
    if (hint) hint.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const metaEl = document.createElement('div');
    metaEl.className = 'meta';
    wrap.appendChild(bubble);
    wrap.appendChild(metaEl);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const sessionId = document.getElementById('session-id').value.trim() || 'session-1';
    const input = document.getElementById('msg-input');
    const message = input.value.trim();
    if (!message) return;
    input.value = '';
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    appendMsg('user', message);
    const botBubble = appendMsg('bot', '…');
    try {
      const r = await fetch(`${API}/chat/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ session_id: sessionId, message }),
      });
      const data = await r.json();
      if (r.status === 401) { logout(); return; }
      if (!r.ok) { botBubble.textContent = `Error: ${data.detail}`; botBubble.style.color = '#fca5a5'; return; }
      botBubble.textContent = data.reply;
      botBubble.parentElement.querySelector('.meta').textContent = `${data.message_count} messages`;
    } catch (e) {
      botBubble.textContent = `Network error: ${e.message}`;
      botBubble.style.color = '#fca5a5';
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  function clearChat() {
    document.getElementById('messages').innerHTML =
      '<div class="empty" id="empty-hint">Send a message to start chatting.</div>';
  }
</script>
</body>
</html>
